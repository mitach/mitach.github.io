<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christmas Rotary</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
    <script src="index.js" type="module"></script>

</head>

<body>
    <dialog id="insert-number-modal" class="modal">
        <div class="modal-content">
            <h1>How many people are here?</h1>
            <input id="people-count" name="people-count" type="number" placeholder="Number..." autofocus>

            <span class="close">Let's Go!</span>
        </div>
    </dialog>

    <dialog id="winner-modal" class="modal">
        <div class="modal-content">
            <h1>The Winner is</h1>
            <span id="num"></span>
            <div class="buttons">
                <span class="close again">Again</span>
                <span class="close next">Next</span>
            </div>
        </div>
    </dialog>

    <div class="award-container">
        <div class="labels">
            <span class="labels__prize">Prize</span>
            <span class="labels__winner">Winner</span>
        </div>
        <div class="info-box">
            <div class="info-box__titles">
                <span class="titles__up">Samsung</span>
                <span class="titles__down">Tablet</span>
            </div>
            <div class="info-box__number">
                <span class="number_1">*</span>
                <span class="number_2">*</span>
                <span class="number_3">*</span>
            </div>
        </div>
    </div>

    <div class="award-container">

            </div>

                <span class="number_4">*</span>
                <span class="number_5">*</span>
                <span class="number_6">*</span>
            </div>
        </div>
    </div>

    <div class="award-container">
        <div class="labels">
            <span class="labels__prize">Prize</span>
            <span class="labels__winner">Winner</span>
        </div>
        <div class="info-box">
            <div class="info-box__titles">
                <span class="titles__up">Samsung</span>
                <span class="titles__down">Tablet</span>
            </div>
            <div class="info-box__number">
                <span class="number_7">*</span>
                <span class="number_8">*</span>

            </div>

                <span class="number_10">*</span>

            </div>
        </div>

</body>

</html>
